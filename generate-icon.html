<!DOCTYPE html>
<html>
<head><title>Generate Icon</title></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<br><button onclick="download()">Download PNG</button>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  
  // Dark rounded background
  const r = 80;
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(512 - r, 0);
  ctx.quadraticCurveTo(512, 0, 512, r);
  ctx.lineTo(512, 512 - r);
  ctx.quadraticCurveTo(512, 512, 512 - r, 512);
  ctx.lineTo(r, 512);
  ctx.quadraticCurveTo(0, 512, 0, 512 - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '800 160px Segoe UI';
  
  ctx.fillStyle = '#ffffff';
  ctx.fillText('trade', 256, 200);
  
  ctx.fillStyle = '#6366f1';
  ctx.fillText('print', 256, 340);

  function download() {
    const a = document.createElement('a');
    a.download = 'apple-touch-icon.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
</script>
</body>
</html>
