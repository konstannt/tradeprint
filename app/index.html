<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Tradeprint"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <title>Tradeprint — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; text-decoration: none; color: #fff; }
    .logo span { color: #6366f1; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; }
    .tabs { display: flex; gap: 0; margin-bottom: 32px; border-bottom: 1px solid #222; }
    .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-size: 15px; font-weight: 600; color: #555; border-bottom: 2px solid transparent; transition: all 0.2s; margin-bottom: -1px; }
    .tab.active { color: #6366f1; border-bottom: 2px solid #6366f1; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
    input { width: 100%; padding: 12px 16px; font-size: 15px; border-radius: 8px; border: 1px solid #333; background: #0a0a0a; color: #fff; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #6366f1; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #555; padding: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
    .pw-eye:hover { color: #aaa; }
    .pw-eye svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn { width: 100%; background-color: #6366f1; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s; margin-top: 8px; }
    .btn:hover { background-color: #4f46e5; }
    .btn:disabled { background-color: #444; cursor: not-allowed; }
    .forgot-link { text-align: right; margin-top: -12px; margin-bottom: 20px; }
    .forgot-link a { font-size: 12px; color: #555; text-decoration: none; cursor: pointer; transition: color 0.2s; }
    .forgot-link a:hover { color: #6366f1; }
    .message { font-size: 13px; margin-top: 16px; text-align: center; min-height: 20px; }
    .message.success { color: #6366f1; }
    .message.error { color: #ef4444; }
    .panel { display: none; }
    .panel.active { display: block; }
    .back-link { font-size: 13px; color: #555; cursor: pointer; margin-bottom: 24px; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; background: none; border: none; padding: 0; }
    .back-link:hover { color: #aaa; }
  </style>
</head>
<body>

  <a href="/" class="logo">trade<span>print</span></a>

  <div class="card">
    <div class="tabs" id="mainTabs">
      <div class="tab active" onclick="switchTab('login')">Log In</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- Login Panel -->
    <div class="panel active" id="loginPanel">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="loginPassword" placeholder="••••••••" />
          <button class="pw-eye" onclick="togglePw('loginPassword', this)" tabindex="-1">
            <svg id="loginEyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="forgot-link"><a onclick="switchTab('forgot')">Forgot password?</a></div>
      <button class="btn" id="loginBtn" onclick="login()">Log In</button>
      <div class="message" id="loginMessage"></div>
    </div>

    <!-- Signup Panel -->
    <div class="panel" id="signupPanel">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="signupPassword" placeholder="••••••••" />
          <button class="pw-eye" onclick="togglePw('signupPassword', this)" tabindex="-1">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div style="font-size:11px;color:#555;margin-top:6px;">Min 8 characters, 1 uppercase & 1 lowercase letter, 1 number</div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="signupConfirm" placeholder="••••••••" />
          <button class="pw-eye" onclick="togglePw('signupConfirm', this)" tabindex="-1">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn" id="signupBtn" onclick="signup()">Create Account</button>
      <div class="message" id="signupMessage"></div>
    </div>

    <!-- Forgot Password Panel -->
    <div class="panel" id="forgotPanel">
      <button class="back-link" onclick="switchTab('login')">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polyline points="15 18 9 12 15 6"/></svg>
        Back to login
      </button>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="forgotEmail" placeholder="you@example.com" />
      </div>
      <button class="btn" id="forgotBtn" onclick="sendReset()">Send Reset Link</button>
      <div class="message" id="forgotMessage"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fpdedufotkmvjsvxdcmk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1Q8yInISuuD3HDWI7mVesQ_A-DSkCM7';

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      const tabs = document.getElementById('mainTabs');

      if (tab === 'login') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('loginPanel').classList.add('active');
        tabs.style.display = 'flex';
      } else if (tab === 'signup') {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('signupPanel').classList.add('active');
        tabs.style.display = 'flex';
      } else if (tab === 'forgot') {
        document.getElementById('forgotPanel').classList.add('active');
        tabs.style.display = 'none';
      }
    }

    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.querySelector('svg').innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');
      const message = document.getElementById('loginMessage');
      if (!email || !password) { message.textContent = 'Please fill in all fields.'; message.className = 'message error'; return; }
      btn.disabled = true; btn.textContent = 'Logging in...';
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.access_token) {
        localStorage.setItem('tp_token', data.access_token);
        localStorage.setItem('tp_refresh_token', data.refresh_token);
        localStorage.setItem('tp_session', JSON.stringify(data));
        localStorage.setItem('tp_user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } else {
        message.textContent = data.error_description || 'Invalid email or password.';
        message.className = 'message error';
        btn.disabled = false; btn.textContent = 'Log In';
      }
    }

    async function signup() {
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const btn = document.getElementById('signupBtn');
      const message = document.getElementById('signupMessage');
      if (!email || !password || !confirm) { message.textContent = 'Please fill in all fields.'; message.className = 'message error'; return; }
      if (password !== confirm) { message.textContent = 'Passwords do not match.'; message.className = 'message error'; return; }
      if (password.length < 8) { message.textContent = 'Password must be at least 8 characters.'; message.className = 'message error'; return; }
      if (!/[A-Z]/.test(password)) { message.textContent = 'Password must contain at least 1 uppercase letter.'; message.className = 'message error'; return; }
      if (!/[a-z]/.test(password)) { message.textContent = 'Password must contain at least 1 lowercase letter.'; message.className = 'message error'; return; }
      if (!/[0-9]/.test(password)) { message.textContent = 'Password must contain at least 1 number.'; message.className = 'message error'; return; }
      btn.disabled = true; btn.textContent = 'Creating account...';
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.id || data.user) {
        message.textContent = "If this email isn't registered yet, you'll receive a confirmation link shortly!";
        message.className = 'message success';
        btn.textContent = 'Done!';
      } else {
        const errMsg = data.msg || data.error_description || '';
        message.textContent = errMsg.toLowerCase().includes('already') ? 'An account with this email already exists.' : 'Something went wrong. Please try again.';
        message.className = 'message error';
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    async function sendReset() {
      const email = document.getElementById('forgotEmail').value.trim();
      const btn = document.getElementById('forgotBtn');
      const message = document.getElementById('forgotMessage');
      if (!email) { message.textContent = 'Please enter your email.'; message.className = 'message error'; return; }
      btn.disabled = true; btn.textContent = 'Sending...';
      const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email })
      });
      message.textContent = "If an account exists for that email, a reset link is on its way.";
      message.className = 'message success';
      btn.textContent = 'Sent!';
    }
  </script>
</body>
</html>
