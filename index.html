<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tradeprint</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .logo span {
      color: #6366f1;
    }

    .tagline {
      font-size: 18px;
      color: #888;
      margin-bottom: 48px;
    }

    .waitlist-text {
      font-size: 14px;
      color: #555;
      margin-top: 24px;
    }

    .btn {
      background-color: #6366f1;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="logo">trade<span>print</span></div>
  <p class="tagline">Discover your edge. Trade with conviction.</p>
  <button class="btn">Join the Waitlist</button>
  <p class="waitlist-text">The smarter trading journal. Coming soon.</p>
</body>
</html>
