<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Tradeprint"/>
<meta name="theme-color" content="#0a0a0a"/>
  <title>Tradeprint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .top-right {
      position: fixed;
      top: 20px;
      right: 20px;
    }

    .login-icon {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
      text-decoration: none;
    }

    .login-icon:hover {
      border-color: #6366f1;
    }

    .login-icon svg {
      width: 20px;
      height: 20px;
      stroke: #888;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-icon:hover svg {
      stroke: #6366f1;
    }

    .logo {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
      text-align: center;
    }

    .logo span { color: #6366f1; }

    .tagline {
      font-size: clamp(14px, 4vw, 18px);
      color: #888;
      margin-bottom: 48px;
      text-align: center;
    }

    .waitlist-form {
      display: flex;
      flex-direction: row;
      gap: 12px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 520px;
    }

    .waitlist-form input {
      padding: 14px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      flex: 1;
      min-width: 0;
      outline: none;
    }

    .waitlist-form input:focus {
      border-color: #6366f1;
    }

    .btn {
      background-color: #6366f1;
      color: white;
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover { background-color: #4f46e5; }
    .btn:disabled { background-color: #444; cursor: not-allowed; }

    .message {
      font-size: 14px;
      margin-top: 8px;
      min-height: 20px;
      text-align: center;
    }

    .message.success { color: #6366f1; }
    .message.error { color: #ef4444; }

    .subtext {
      font-size: 14px;
      color: #555;
      margin-top: 16px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .waitlist-form {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <div class="top-right">
    <a href="/app" class="login-icon" title="Log in">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
  </div>

  <div class="logo">trade<span>print</span></div>
  <p class="tagline">Discover your edge. Trade with conviction.</p>

  <div class="waitlist-form">
    <input type="email" id="emailInput" placeholder="Enter your email" />
    <button class="btn" id="joinBtn" onclick="joinWaitlist()">Join the Waitlist</button>
  </div>

  <div class="message" id="message"></div>
  <p class="subtext">The smarter trading journal. Coming soon.</p>

  <script>
    const SUPABASE_URL = 'https://fpdedufotkmvjsvxdcmk.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1Q8yInISuuD3HDWI7mVesQ_A-DSkCM7';

    async function joinWaitlist() {
      const email = document.getElementById('emailInput').value.trim();
      const btn = document.getElementById('joinBtn');
      const message = document.getElementById('message');

      if (!email || !email.includes('@')) {
        message.textContent = 'Please enter a valid email.';
        message.className = 'message error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Joining...';

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ email })
        });

        if (response.ok) {
          message.textContent = "You're on the list! We'll be in touch.";
          message.className = 'message success';
          document.getElementById('emailInput').value = '';
          btn.textContent = 'Joined!';
        } else {
          const err = await response.json();
          if (err.code === '23505') {
            message.textContent = 'This email is already on the waitlist!';
            message.className = 'message error';
          } else {
            throw new Error('Something went wrong.');
          }
          btn.disabled = false;
          btn.textContent = 'Join the Waitlist';
        }
      } catch (err) {
        message.textContent = 'Something went wrong. Please try again.';
        message.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Join the Waitlist';
      }
    }

    document.getElementById('emailInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') joinWaitlist();
    });
  </script>
</body>
</html>
